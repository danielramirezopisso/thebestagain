<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Best Again</title>
  <meta name="description" content="Community-rated food spots and products — The Best Again." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="The Best Again" />
  <meta name="twitter:card" content="summary" />
  <!-- Dynamic title/meta set by marker.js after data loads -->
  <meta id="metaDesc" name="description" content="" />
  <meta id="ogTitle" property="og:title" content="" />
  <meta id="ogDesc" property="og:description" content="" />
  <meta id="ogUrl" property="og:url" content="" />
  <!-- Google Analytics 4 — replace G-VYVTQPBTPC with your Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VYVTQPBTPC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-VYVTQPBTPC");
  </script>
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="marker.css" />
  <link rel="stylesheet" href="traction.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body onload="initMarkerPage()">
    <header class="topbar topbar-sticky">
    <a class="brand" href="index.html">The Best Again</a>
    <nav class="nav" id="mainNav">
      <a href="index.html">Home</a>
      <a href="list.html">List</a>
      <a href="map.html">Map</a>
      <a href="products.html">Products</a>
      <a href="rutas.html">Rutas</a>
    </nav>
    <div class="nav-right">
      <span id="authStatus" class="auth-pill"></span>
      <button class="burger" id="burgerBtn" onclick="toggleNav()" aria-label="Menu" aria-expanded="false">&#9776;</button>
    </div>
  </header>

  <main class="marker-page-container">
    <p id="pageStatus" class="muted" style="margin:10px 0;"></p>

    <!-- ── HERO ── -->
    <div class="marker-hero" id="markerHero">
      <div class="hero-left">
        <div class="hero-cat-icon" id="heroCatIcon"></div>
        <div>
          <div class="hero-type-tag" id="heroTypeTag"></div>
          <h1 class="hero-title" id="markerTitle">Loading…</h1>
          <p class="hero-sub muted" id="markerSubtitle"></p>
        </div>
      </div>
      <div class="hero-actions" id="heroActions"></div>
    </div>

    <!-- ── SHARE PANEL (fallback for desktop) ── -->
    <div class="share-panel" id="sharePanel" style="display:none;">
      <a class="share-btn share-whatsapp" href="#" onclick="event.preventDefault(); window.open('https://wa.me/?text=' + encodeURIComponent(document.title.replace(' — The Best Again','') + ' ' + location.href), '_blank')">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp
      </a>
      <button class="share-btn share-copy" id="shareCopyBtn" onclick="copyMarkerLink()">
        🔗 Copy link
      </button>
    </div>


    <!-- ── PHOTOS ── -->
    <div class="card m-card photos-card" id="photosCard" style="display:none;">
      <div class="m-card-head-row">
        <span class="m-card-head">Photos</span>
        <span id="photosCount" class="muted" style="font-size:12px;"></span>
      </div>
      <div class="photo-strip-wrap">
        <div class="photo-strip" id="photoStrip"></div>
        <label class="photo-upload-btn tba-btn" id="photoUploadLabel" style="display:none;">
          + Add photo
          <input type="file" id="photoFileInput" accept="image/*" style="display:none;" onchange="uploadPhoto(this)" />
        </label>
      </div>
      <p id="photoStatus" class="muted" style="font-size:12px; margin-top:6px;"></p>
    </div>

    <!-- ── MAIN GRID ── -->
    <div class="marker-grid" id="markerGrid">

      <!-- LEFT COLUMN -->
      <div class="marker-col-left">

        <!-- Rating card -->
        <div class="card m-card" id="ratingCard">
          <div class="m-card-head">Rating</div>
          <div class="rating-display" id="ratingDisplay"></div>
        </div>

        <!-- My vote card (logged in only) -->
        <div class="card m-card" id="voteCard" style="display:none;">
          <div class="m-card-head">My vote</div>
          <div class="vote-row">
            <div class="vote-btns" id="voteBtns"></div>
            <div class="vote-actions">
              <button class="tba-btn tba-btn-primary" onclick="saveMyVote()">Save</button>
              <button class="tba-btn" onclick="clearMyVote()" id="btnClearVote" style="display:none;">Remove</button>
            </div>
          </div>
          <p id="voteStatus" class="muted vote-status"></p>
        </div>

        <!-- Details card -->
        <div class="card m-card">
          <div class="m-card-head">Details</div>
          <div id="detailsContent"></div>
        </div>

        <!-- Mini map (places only) -->
        <div class="card m-card" id="miniMapCard" style="display:none;">
          <div class="m-card-head">Location</div>
          <div id="miniMap" class="mini-map"></div>
          <div id="miniMapAddress" class="mini-map-address muted"></div>
        </div>

      </div>

      <!-- RIGHT COLUMN -->
      <div class="marker-col-right">

        <!-- Category ranking widget -->
        <div class="card m-card" id="rankingCard" style="display:none;">
          <div class="m-card-head-row">
            <span class="m-card-head">Category ranking</span>
            <a id="editVotesCatLink" href="my-votes.html" class="m-card-link">✏️ Edit my votes</a>
          </div>
          <div class="ranking-position" id="rankingPosition"></div>
          <div class="ranking-list" id="rankingList"></div>
        </div>

        <!-- More from this brand (products only) -->
        <div class="card m-card" id="moreBrandCard" style="display:none;">
          <div class="m-card-head-row">
            <span class="m-card-head" id="moreBrandHead">More from this brand</span>
          </div>
          <div class="ranking-list" id="moreBrandList"></div>
        </div>

        <!-- Others from this chain (places only) -->
        <div class="card m-card" id="moreChainCard" style="display:none;">
          <div class="m-card-head-row">
            <span class="m-card-head" id="moreChainHead">Others from this chain</span>
          </div>
          <div class="ranking-list" id="moreChainList"></div>
        </div>

        <!-- Comments card -->
        <div class="card m-card" id="commentsCard">
          <div class="m-card-head-row">
            <span class="m-card-head">Comments</span>
            <span id="commentsCount" class="m-card-link" style="cursor:default;"></span>
          </div>

          <!-- Write a comment (logged in only) -->
          <div id="commentWriteArea" style="display:none;">
            <textarea id="newCommentInput" class="comment-textarea" placeholder="Share your thoughts…" rows="2" maxlength="500"></textarea>
            <div class="comment-write-foot">
              <span id="newCommentCharCount" class="comment-char-count">0 / 500</span>
              <button class="tba-btn tba-btn-primary comment-post-btn" onclick="postComment()">Post</button>
            </div>
          </div>
          <div id="commentLoginPrompt" class="comment-login-prompt" style="display:none;">
            <a href="login.html">Login</a> to leave a comment.
          </div>

          <!-- List -->
          <div id="commentsList"></div>
        </div>

      </div>
    </div>

    <!-- ── EDIT FORM (hidden by default) ── -->
    <div class="card m-card" id="editCard" style="display:none;">
      <div class="m-card-head">Edit marker</div>

      <div class="edit-grid">
        <div class="edit-field">
          <label>Title</label>
          <input id="e_title" />
        </div>
        <div class="edit-field">
          <label>Type</label>
          <select id="e_group_type" onchange="onEditGroupChanged()">
            <option value="place">Place</option>
            <option value="product">Product</option>
          </select>
        </div>
        <div class="edit-field">
          <label>Category</label>
          <select id="e_category"></select>
        </div>
        <div class="edit-field" id="brandRow" style="display:none;">
          <label>Brand</label>
          <select id="e_brand"></select>
        </div>
        <div class="edit-field edit-row" id="productNameRow" style="display:none;">
          <label>Product name <span class="muted" style="font-weight:400;font-size:11px;">(optional)</span></label>
          <input id="e_product_name" placeholder="e.g. Classic Recipe" />
        </div>
        <div class="edit-field edit-row" id="chainRow" style="display:none;">
          <label>Chain</label>
          <select id="e_chain_id"></select>
        </div>
        <div class="edit-field">
          <label>Address</label>
          <input id="e_address" placeholder="Optional" />
        </div>
        <div class="edit-field">
          <label>Lat</label>
          <input id="e_lat" placeholder="41.3889" />
        </div>
        <div class="edit-field">
          <label>Lon</label>
          <input id="e_lon" placeholder="2.1618" />
        </div>

      </div>

      <div class="edit-foot">
        <span id="editStatus" class="muted"></span>
        <div style="display:flex;gap:10px;">
          <button onclick="cancelEdits()">Cancel</button>
          <button class="tba-btn tba-btn-primary" onclick="saveEdits()">Save changes</button>
        </div>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="auth.js"></script>
  <script src="header-auth.js"></script>
  <script>renderAuthHeader();</script>
  <script src="wishlist-btn.js"></script>
  <script src="marker.js?v=7"></script>
  <script src="traction.js?v=204"></script>

  <script>
  function toggleNav() {
    const nav = document.getElementById('mainNav');
    const btn = document.getElementById('burgerBtn');
    const open = nav.classList.toggle('nav-open');
    btn.innerHTML = open ? '&#10005;' : '&#9776;';
  }
  // Close nav when a link is clicked
  document.addEventListener('DOMContentLoaded', () => {
    const nav = document.getElementById('mainNav');
    if (nav) nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      nav.classList.remove('nav-open');
      const btn = document.getElementById('burgerBtn');
      if (btn) btn.innerHTML = '&#9776;';
    }));
  });
  </script>

  <!-- ── PHOTO LIGHTBOX ── -->
  <div id="photoLightbox" class="lightbox-overlay" style="display:none;" onclick="if(event.target===this)closeLightbox()">
    <div class="lightbox-inner">
      <!-- Left thumbnail strip -->
      <div class="lightbox-thumbs" id="lightboxThumbs"></div>
      <!-- Main view -->
      <div class="lightbox-main">
        <button class="lightbox-close" onclick="closeLightbox()">&#10005;</button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev" onclick="lightboxNav(-1)">&#8592;</button>
        <div class="lightbox-img-wrap">
          <img id="lightboxImg" src="" alt="" />
        </div>
        <button class="lightbox-nav lightbox-next" id="lightboxNext" onclick="lightboxNav(1)">&#8594;</button>
        <div class="lightbox-dots" id="lightboxDots"></div>
        <div class="lightbox-caption" id="lightboxCaption"></div>
      </div>
    </div>
  </div>

  <!-- ── TRACTION POPUP (shared) ── -->
  <div class="traction-overlay" id="tractionOverlay" onclick="if(event.target===this)closeTraction()">
    <div class="traction-popup">
      <span class="traction-emoji" id="trEmoji">🚧</span>
      <h2 id="trTitle"></h2>
      <p id="trBody"></p>
      <div class="traction-request-area" id="trRequestArea" style="display:none;">
        <label class="tr-field-label" id="trRequestLabel">Your suggestion</label>
        <textarea id="trRequestText" rows="2"></textarea>
        <!-- Brand-only extras -->
        <div id="trBrandExtras" style="display:none;">
          <label class="tr-field-label" style="margin-top:10px;">Category <span class="tr-field-note">(which category does this brand belong to?)</span></label>
          <select id="trCategorySelect">
            <option value="">— Select existing category —</option>
          </select>
          <div class="tr-or-row"><span>or suggest a new one</span></div>
          <input type="text" id="trNewCategory" placeholder="New category name (optional)" />
        </div>
      </div>
      <div class="traction-email-area" id="trEmailArea">
        <input type="email" id="trEmail" placeholder="Your email address" />
      </div>
      <div class="traction-actions">
        <button class="tba-btn tba-btn-primary" id="trSubmitBtn" onclick="submitTraction()">Notify me</button>
        <button class="tba-btn" id="trSkipBtn" onclick="closeTraction()">Maybe later</button>
      </div>
      <div class="traction-status" id="trStatus"></div>
    </div>
  </div>

</body>
</html>
