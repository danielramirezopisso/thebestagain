<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Best Again — Marker</title>
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="marker.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body onload="initMarkerPage()">
    <header class="topbar topbar-sticky">
    <a class="brand" href="index.html">The Best Again</a>
    <nav class="nav" id="mainNav">
      <a href="index.html">Home</a>
      <a href="list.html">List</a>
      <a href="map.html">Map</a>
      <a href="products.html">Products</a>
      <a href="my-votes.html">My Votes</a>
      <a href="admin.html" id="adminNavLink" style="display:none;">Admin</a>
    </nav>
    <div class="nav-right">
      <span id="authStatus" class="auth-pill"></span>
      <button class="burger" id="burgerBtn" onclick="toggleNav()" aria-label="Menu" aria-expanded="false">&#9776;</button>
    </div>
  </header>

  <main class="marker-page-container">
    <p id="pageStatus" class="muted" style="margin:10px 0;"></p>

    <!-- ── HERO ── -->
    <div class="marker-hero" id="markerHero">
      <div class="hero-left">
        <div class="hero-cat-icon" id="heroCatIcon"></div>
        <div>
          <div class="hero-type-tag" id="heroTypeTag"></div>
          <h1 class="hero-title" id="markerTitle">Loading…</h1>
          <p class="hero-sub muted" id="markerSubtitle"></p>
        </div>
      </div>
      <div class="hero-actions" id="heroActions"></div>
    </div>


    <!-- ── PHOTOS ── -->
    <div class="card m-card photos-card" id="photosCard" style="display:none;">
      <div class="m-card-head-row">
        <span class="m-card-head">Photos</span>
        <span id="photosCount" class="muted" style="font-size:12px;"></span>
      </div>
      <div class="photo-strip-wrap">
        <div class="photo-strip" id="photoStrip"></div>
        <label class="photo-upload-btn tba-btn" id="photoUploadLabel" style="display:none;">
          + Add photo
          <input type="file" id="photoFileInput" accept="image/*" style="display:none;" onchange="uploadPhoto(this)" />
        </label>
      </div>
      <p id="photoStatus" class="muted" style="font-size:12px; margin-top:6px;"></p>
    </div>

    <!-- ── MAIN GRID ── -->
    <div class="marker-grid" id="markerGrid">

      <!-- LEFT COLUMN -->
      <div class="marker-col-left">

        <!-- Rating card -->
        <div class="card m-card" id="ratingCard">
          <div class="m-card-head">Rating</div>
          <div class="rating-display" id="ratingDisplay"></div>
        </div>

        <!-- My vote card (logged in only) -->
        <div class="card m-card" id="voteCard" style="display:none;">
          <div class="m-card-head">My vote</div>
          <div class="vote-row">
            <div class="vote-btns" id="voteBtns"></div>
            <div class="vote-actions">
              <button class="tba-btn tba-btn-primary" onclick="saveMyVote()">Save</button>
              <button class="tba-btn" onclick="clearMyVote()" id="btnClearVote" style="display:none;">Remove</button>
            </div>
          </div>
          <p id="voteStatus" class="muted vote-status"></p>
        </div>

        <!-- Details card -->
        <div class="card m-card">
          <div class="m-card-head">Details</div>
          <div id="detailsContent"></div>
        </div>

        <!-- Mini map (places only) -->
        <div class="card m-card" id="miniMapCard" style="display:none;">
          <div class="m-card-head">Location</div>
          <div id="miniMap" class="mini-map"></div>
          <div id="miniMapAddress" class="mini-map-address muted"></div>
        </div>

      </div>

      <!-- RIGHT COLUMN -->
      <div class="marker-col-right">

        <!-- Category ranking widget -->
        <div class="card m-card" id="rankingCard" style="display:none;">
          <div class="m-card-head-row">
            <span class="m-card-head">Category ranking</span>
            <a id="editVotesCatLink" href="my-votes.html" class="m-card-link">✏️ Edit my votes</a>
          </div>
          <div class="ranking-position" id="rankingPosition"></div>
          <div class="ranking-list" id="rankingList"></div>
        </div>

        <!-- Comments card -->
        <div class="card m-card" id="commentsCard">
          <div class="m-card-head-row">
            <span class="m-card-head">Comments</span>
            <span id="commentsCount" class="m-card-link" style="cursor:default;"></span>
          </div>

          <!-- Write a comment (logged in only) -->
          <div id="commentWriteArea" style="display:none;">
            <textarea id="newCommentInput" class="comment-textarea" placeholder="Share your thoughts…" rows="2" maxlength="500"></textarea>
            <div class="comment-write-foot">
              <span id="newCommentCharCount" class="comment-char-count">0 / 500</span>
              <button class="tba-btn tba-btn-primary comment-post-btn" onclick="postComment()">Post</button>
            </div>
          </div>
          <div id="commentLoginPrompt" class="comment-login-prompt" style="display:none;">
            <a href="login.html">Login</a> to leave a comment.
          </div>

          <!-- List -->
          <div id="commentsList"></div>
        </div>

      </div>
    </div>

    <!-- ── EDIT FORM (hidden by default) ── -->
    <div class="card m-card" id="editCard" style="display:none;">
      <div class="m-card-head">Edit marker</div>

      <div class="edit-grid">
        <div class="edit-field">
          <label>Title</label>
          <input id="e_title" />
        </div>
        <div class="edit-field">
          <label>Type</label>
          <select id="e_group_type" onchange="onEditGroupChanged()">
            <option value="place">Place</option>
            <option value="product">Product</option>
          </select>
        </div>
        <div class="edit-field">
          <label>Category</label>
          <select id="e_category"></select>
        </div>
        <div class="edit-field" id="brandRow" style="display:none;">
          <label>Brand</label>
          <select id="e_brand"></select>
        </div>
        <div class="edit-field">
          <label>Address</label>
          <input id="e_address" placeholder="Optional" />
        </div>
        <div class="edit-field">
          <label>Lat</label>
          <input id="e_lat" placeholder="41.3889" />
        </div>
        <div class="edit-field">
          <label>Lon</label>
          <input id="e_lon" placeholder="2.1618" />
        </div>
        <div class="edit-field">
          <label>Rating (legacy)</label>
          <select id="e_rating"></select>
        </div>
      </div>

      <div class="edit-foot">
        <span id="editStatus" class="muted"></span>
        <div style="display:flex;gap:10px;">
          <button onclick="cancelEdits()">Cancel</button>
          <button class="tba-btn tba-btn-primary" onclick="saveEdits()">Save changes</button>
        </div>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="auth.js"></script>
  <script src="header-auth.js"></script>
  <script>renderAuthHeader();</script>
  <script src="marker.js?v=7"></script>

  <script>
  function toggleNav() {
    const nav = document.getElementById('mainNav');
    const btn = document.getElementById('burgerBtn');
    const open = nav.classList.toggle('nav-open');
    btn.innerHTML = open ? '&#10005;' : '&#9776;';
  }
  // Close nav when a link is clicked
  document.addEventListener('DOMContentLoaded', () => {
    const nav = document.getElementById('mainNav');
    if (nav) nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      nav.classList.remove('nav-open');
      const btn = document.getElementById('burgerBtn');
      if (btn) btn.innerHTML = '&#9776;';
    }));
  });
  </script>

  <!-- ── PHOTO LIGHTBOX ── -->
  <div id="photoLightbox" class="lightbox-overlay" style="display:none;" onclick="if(event.target===this)closeLightbox()">
    <div class="lightbox-inner">
      <!-- Left thumbnail strip -->
      <div class="lightbox-thumbs" id="lightboxThumbs"></div>
      <!-- Main view -->
      <div class="lightbox-main">
        <button class="lightbox-close" onclick="closeLightbox()">&#10005;</button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev" onclick="lightboxNav(-1)">&#8592;</button>
        <div class="lightbox-img-wrap">
          <img id="lightboxImg" src="" alt="" />
        </div>
        <button class="lightbox-nav lightbox-next" id="lightboxNext" onclick="lightboxNav(1)">&#8594;</button>
        <div class="lightbox-dots" id="lightboxDots"></div>
        <div class="lightbox-caption" id="lightboxCaption"></div>
      </div>
    </div>
  </div>

</body>
</html>
