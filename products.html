<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>The Best Again — Products</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="products.css" />
</head>

<body class="products-page" onload="initProductsMasonryPage()">
    <header class="topbar topbar-sticky">
    <a class="brand" href="index.html">The Best Again</a>
    <nav class="nav" id="mainNav">
      <a href="index.html">Home</a>
      <a href="list.html">List</a>
      <a href="map.html">Map</a>
      <a class="active" href="products.html">Products</a>
      <!-- <a href="my-votes.html">My Votes</a> -->
      <!-- <a href="admin.html" id="adminNavLink" style="display:none;">Admin</a> -->
    </nav>
    <div class="nav-right">
      <span id="authStatus" class="auth-pill"></span>
      <button class="burger" id="burgerBtn" onclick="toggleNav()" aria-label="Menu" aria-expanded="false">&#9776;</button>
    </div>
  </header>

  <main class="products-shell">
    <!-- TOP TOOLBAR -->
    <section class="products-toolbar">
      <button class="filter-toggle-btn" id="prodFilterToggle" style="display:none;">
        Filters <span class="filter-toggle-arrow">▼</span>
      </button>
      <div class="filter-collapsible open" id="prodFilterBody">
      <div class="toolbar-left">
        <div class="toolbar-block">
          <div class="toolbar-label">Category</div>
          <div class="toolbar-inline">
            <div id="catQuick" class="chip-row"></div>

            <select id="catMore" class="select-compact" onchange="onCategoryMoreChanged()">
              <option value="">More…</option>
            </select>

            <button id="btnClearFilters" class="chip chip-clear" style="display:none;" onclick="clearFilters()">✕ Clear</button>
          </div>
        </div>

        <div class="toolbar-block">
          <div class="toolbar-label">Rating</div>
          <div id="ratingSeg" class="seg-row"></div>
        </div>
      </div>

      <div class="toolbar-right">
        <span id="pageStatus" class="muted"></span>
      </div>
    </section>

    <!-- CONTENT -->
    <section class="products-area">
      <!-- lanes (grid, row-first) -->
      <div id="lanes" class="lanes-grid"></div>

      <!-- right sidebar: Add product panel -->
      <aside id="addPanel" class="add-panel">
        <div class="panel-title">Add product</div>
        <div class="panel-sub muted">A product is Category + Brand (unique). Creating also saves your vote.</div>

        <div id="addPanelLoggedOut" class="muted" style="display:none; margin-top:10px;">
          Please <a href="login.html"><b>login</b></a> to add products.
        </div>

        <div id="addPanelForm" style="margin-top:10px;">
          <label>Category</label>
          <select id="p_category"></select>

          <label style="margin-top:10px;">Brand</label>
          <select id="p_brand"></select>

          <label style="margin-top:10px;">My vote (1–10)</label>
          <select id="p_vote"></select>

          <div style="margin-top:12px; display:flex; gap:10px; align-items:center;">
            <button class="tba-btn tba-btn-primary" onclick="saveProduct()">Save</button>
            <span id="p_status" class="muted"></span>
          </div>
        </div>
      </aside>

      <!-- Right drawer OVERLAY (does not steal width) -->
      <div id="drawerOverlay" class="drawer-overlay" style="display:none;" onclick="closeDrawer()"></div>

      <aside id="drawer" class="drawer drawer-slide" style="display:none;">
        <div class="drawer-head">
          <div class="drawer-title">
            <span class="drawer-pill">🛒 Product</span>
            <span id="drawerCatName">—</span>
          </div>

          <div class="drawer-actions">
            <button class="tba-btn" id="drawerSortBtn" onclick="toggleDrawerSort()" title="Toggle sort">↓</button>
            <button class="tba-btn" onclick="closeDrawer()">Close</button>
          </div>
        </div>

        <div class="drawer-body" id="drawerList"></div>
      </aside>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="header-auth.js"></script>
  <script>renderAuthHeader();</script>

  <script src="products.js?v=202"></script>

  <script>
  function toggleNav() {
    const nav = document.getElementById('mainNav');
    const btn = document.getElementById('burgerBtn');
    const open = nav.classList.toggle('nav-open');
    btn.innerHTML = open ? '&#10005;' : '&#9776;';
  }
  // Close nav when a link is clicked
  document.addEventListener('DOMContentLoaded', () => {
    const nav = document.getElementById('mainNav');
    if (nav) nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      nav.classList.remove('nav-open');
      const btn = document.getElementById('burgerBtn');
      if (btn) btn.innerHTML = '&#9776;';
    }));
  });
  </script>

  <script>
  window.addEventListener('load', function() {
    if (window.innerWidth > 768) return;
    const btn = document.getElementById('prodFilterToggle');
    const body = document.getElementById('prodFilterBody');
    if (!btn || !body) return;
    btn.style.display = 'flex';
    body.classList.remove('open');
    btn.addEventListener('click', () => {
      const open = body.classList.toggle('open');
      btn.classList.toggle('open', open);
      btn.querySelector('.filter-toggle-arrow').textContent = open ? '▲' : '▼';
    });
  });
  </script>
</body>
</html>
