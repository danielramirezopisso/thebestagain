<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Battles — The Best Again</title>
  <meta name="description" content="Vote on the great food debates. Tortilla con o sin cebolla? McDonald's o Burger King? Make your voice heard." />
  <meta property="og:title" content="Battles — The Best Again" />
  <meta property="og:description" content="Vote on the great food debates. Make your voice heard." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="battles.css" />
</head>
<body class="battles-page" onload="initBattles()">

  <header class="topbar topbar-sticky">
    <a class="brand" href="index.html">The Best Again</a>
    <nav class="nav" id="mainNav">
      <a href="index.html">Home</a>
      <a href="list.html">List</a>
      <a href="map.html">Map</a>
      <a href="products.html">Products</a>
      <a href="rutas.html">Rutas</a>
      <a href="ranking.html">Rankings</a>
      <a class="active" href="battles.html">Battles</a>
    </nav>
    <div class="nav-right">
      <button class="burger" id="burgerBtn" onclick="toggleNav()" aria-label="Menu" aria-expanded="false">&#9776;</button>
      <div id="authHeaderSlot"></div>
    </div>
  </header>

  <main class="battles-main">

    <!-- HERO -->
    <section class="battles-hero">
      <div class="battles-hero-label">The Great Debates</div>
      <h1 class="battles-hero-title">Battles</h1>
      <p class="battles-hero-sub">The questions that divide tables. Vote, see where everyone stands.</p>
    </section>

    <!-- STATS BAR -->
    <div class="battles-stats" id="battlesStats" style="display:none;">
      <span id="statsTotalVotes">—</span> votes cast across <span id="statsTotalBattles">—</span> battles
    </div>

    <!-- GRID -->
    <div class="battles-grid" id="battlesGrid">
      <!-- Skeleton -->
      <div class="battle-skeleton"></div>
      <div class="battle-skeleton"></div>
      <div class="battle-skeleton"></div>
      <div class="battle-skeleton"></div>
      <div class="battle-skeleton"></div>
      <div class="battle-skeleton"></div>
    </div>

    <!-- Empty state -->
    <div class="battles-empty" id="battlesEmpty" style="display:none;">
      <div class="battles-empty-icon">⚔️</div>
      <h3>No battles yet</h3>
      <p class="muted">Check back soon — the debates are coming.</p>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="header-auth.js"></script>
  <script>renderAuthHeader();</script>
  <script src="battles.js"></script>

  <script>
  function toggleNav() {
    const nav = document.getElementById('mainNav');
    const btn = document.getElementById('burgerBtn');
    const open = nav.classList.toggle('nav-open');
    btn.innerHTML = open ? '&#10005;' : '&#9776;';
    btn.setAttribute('aria-expanded', open);
  }
  document.addEventListener('DOMContentLoaded', () => {
    const nav = document.getElementById('mainNav');
    if (nav) nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      nav.classList.remove('nav-open');
      const btn = document.getElementById('burgerBtn');
      if (btn) { btn.innerHTML = '&#9776;'; btn.setAttribute('aria-expanded', false); }
    }));
  });
  </script>
</body>
</html>
